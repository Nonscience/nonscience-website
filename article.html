<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章 · Nonscience</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1><a href="index.html" style="color: inherit; text-decoration: none;">Nonscience</a></h1>
        <p>Nonsense is the New Science</p>
    </header>

    <main id="article-container">
        <!-- 文章内容将由 JavaScript 动态填充 -->
        <p style="text-align: center;">加载中……</p>
    </main>

    <footer>
        <p><a href="index.html">← 返回首页</a></p>
        <p>© 2025 Nonscience</p>
    </footer>

    <script>
        // 获取 URL 参数中的文章 id
        const urlParams = new URLSearchParams(window.location.search);
        const articleId = urlParams.get('id');

        // 如果没有 id，跳回首页
        if (!articleId) {
            window.location.href = 'index.html';
        }

        // 加载 JSON 数据并显示文章
        fetch('articles.json')
            .then(response => response.json())
            .then(articles => {
                // 查找对应 ID 的文章
                const article = articles.find(a => a.id == articleId);
                if (!article) {
                    document.getElementById('article-container').innerHTML = '<p style="color: #8b0000;">文章不存在</p>';
                    return;
                }

                // 生成文章 HTML
                const contentHTML = article.content.map(para => `<p>${para}</p>`).join('');
                const referencesHTML = article.references.map(ref => `<li>${ref}</li>`).join('');

                const html = `
                    <article>
                        <h2>${article.title}</h2>
                        <p class="author">作者：${article.author}</p>
                        <section class="abstract">
                            <h3>摘要</h3>
                            <p>${article.abstract}</p>
                        </section>
                        <section class="content">
                            <h3>正文</h3>
                            ${contentHTML}
                        </section>
                        ${article.references.length ? `
                        <section class="references">
                            <h3>参考文献</h3>
                            <ul>${referencesHTML}</ul>
                        </section>
                        ` : ''}
                    </article>
                `;

                document.getElementById('article-container').innerHTML = html;
                // 更新页面标题
                document.title = `${article.title} · Nonscience`;
            })
            .catch(error => {
                document.getElementById('article-container').innerHTML = '<p style="color: #8b0000;">加载失败，请稍后重试</p>';
                console.error(error);
            });
    </script>
</body>
</html>
