            <h2>论扯淡的哲学基础</h2>
            <p class="author">作者：张三</p>
            <section class="abstract">
                <h3>摘要</h3>
                <p>本文探讨“扯淡”作为一种语言现象背后的哲学意涵，分析其在日常交流中的功能与边界。</p>
            </section>
            <section class="content">
                <h3>正文</h3>
                <p>扯淡（bullshit）与说谎不同。说谎者知道真相但刻意隐藏，而扯淡者则完全不在乎真假，只追求效果……</p>
                <p>这种现象在当代学术语境中尤为常见，值得警惕。</p>
            </section>

                    <li>[2] 李四. 语言哲学视域下的扯淡现象. 哲学研究, 2020(3).</li>
                </ul>
            </section>
